<!DOCTYPE html>
<html>
<head>
    <title>Gimbal WebSerial Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .slider { width: 80%; margin: 20px 0; height: 35px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; margin: 5px; cursor: pointer; }
        button.red { background: #dc3545; }
        button.green { background: #28a745; }
        button.connect { background: #ffc107; color: black; font-weight: bold; }
        .status { color: #00ff00; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Gimbal Web Control</h1>
    
    <div class="card">
        <button class="connect" id="connectBtn">1. CONNECT GIMBAL</button>
        <p id="status" class="status">Not Connected</p>
    </div>

    <div class="card">
        <h3>Yaw (Pin 0)</h3>
        <input type="range" min="60" max="120" value="90" class="slider" id="yawSlider">
        <span id="yawLabel">90</span>°
    </div>

    <div class="card">
        <h3>Pitch (Pin 1)</h3>
        <input type="range" min="60" max="120" value="90" class="slider" id="pitchSlider">
        <span id="pitchLabel">90</span>°
    </div>

    <div class="card">
        <button onclick="sendCommand('C')">Center All</button>
        <button class="red" onclick="sendCommand('S')">Relax (Kill)</button>
        <button class="green" onclick="sendCommand('A')">Auto Mode</button>
    </div>

    <script>
        let port;
        let writer;

        const connectBtn = document.getElementById('connectBtn');
        const status = document.getElementById('status');
        const yawSlider = document.getElementById('yawSlider');
        const pitchSlider = document.getElementById('pitchSlider');

        async function connect() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                status.innerText = "Connected to Gimbal!";
                connectBtn.style.display = 'none';
            } catch (err) {
                status.innerText = "Error: " + err;
            }
        }

        async function sendCommand(cmd) {
            if (writer) {
                const encoder = new TextEncoder();
                await writer.write(encoder.encode(cmd + "\n"));
                console.log("Sent:", cmd);
            }
        }

        yawSlider.oninput = () => {
            document.getElementById('yawLabel').innerText = yawSlider.value;
            sendCommand('Y' + yawSlider.value);
        };

        pitchSlider.oninput = () => {
            document.getElementById('pitchLabel').innerText = pitchSlider.value;
            sendCommand('P' + pitchSlider.value);
        };

        connectBtn.onclick = connect;
    </script>
</body>
</html>
